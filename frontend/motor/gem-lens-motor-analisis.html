<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem Lens — Motor de Análisis v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b09; --bg2: #121210; --bg3: #1a1a17; --surface: #222220;
  --gold: #d4a843; --gold2: #f0c96a; --gold3: #7a5f1a; --golddim: rgba(212,168,67,0.12);
  --teal: #2eb89a; --tealdim: rgba(46,184,154,0.1);
  --text: #f0ede6; --text2: rgba(240,237,230,0.55); --text3: rgba(240,237,230,0.28);
  --border: rgba(240,237,230,0.07); --border2: rgba(240,237,230,0.14);
  --goldborder: rgba(212,168,67,0.22);
  --FD: 'Bebas Neue', sans-serif;
  --FM: 'DM Mono', monospace;
  --F: 'DM Sans', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--F); background:var(--bg); color:var(--text); font-size:15px; line-height:1.6; overflow-x:hidden; }

/* ESTRUCTURA */
.app { display:grid; grid-template-columns:280px 1fr; height:100vh; }
.sidebar { background:var(--bg2); border-right:0.5px solid var(--border); padding:20px 0; display:flex; flex-direction:column; overflow-y:auto; }
.sidebar-logo { display:flex; align-items:center; gap:10px; padding:0 24px 24px; border-bottom:0.5px solid var(--border); }
.sidebar-gem { width:18px; height:18px; background:var(--gold); clip-path:polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%); }
.sidebar-logo-text { font-family:var(--FD); font-size:20px; letter-spacing:2px; }

.sidebar-section { padding:18px 24px 6px; }
.sidebar-section-title { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text3); }

.tab-btn {
  display:flex; align-items:center; width:100%; padding:12px 24px; border:none; background:transparent; 
  cursor:pointer; font-family:var(--F); font-size:13px; color:var(--text2); border-left:2px solid transparent; transition:0.2s;
}
.tab-btn:hover { background:rgba(255,255,255,0.02); }
.tab-btn.active { background:var(--golddim); color:var(--gold2); border-left-color:var(--gold); }

.main { padding:40px; overflow-y:auto; background:radial-gradient(circle at top right, #161614, #0b0b09); height:100vh; }
.panel { display:none; max-width:1000px; margin:0 auto; animation: fadeIn 0.4s ease-out; }
.panel.active { display:block; }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* UI COMPONENTS */
.upload-container { background:var(--bg2); border:1px dashed var(--goldborder); border-radius:12px; padding:40px; text-align:center; margin-bottom:32px; }
.btn-upload { background:var(--surface); color:var(--text); padding:10px 24px; border-radius:6px; border:0.5px solid var(--border2); cursor:pointer; font-size:11px; font-family:var(--FM); }
.preview-strip { display:flex; justify-content:center; gap:12px; margin-top:24px; flex-wrap:wrap; }
.preview-box { width:90px; height:125px; border-radius:6px; object-fit:cover; border:1px solid var(--border2); }
.btn-run-ia { width:100%; max-width:400px; margin:32px auto 0; padding:16px; border:none; border-radius:8px; background:linear-gradient(135deg, var(--gold), var(--gold2)); color:var(--bg); font-family:var(--FD); font-size:22px; cursor:pointer; display:block; transition: 0.2s; }
.btn-run-ia:disabled { opacity:0.3; cursor:not-allowed; filter: grayscale(1); }

/* RESULTADOS */
.card-hero { background:var(--bg2); border:0.5px solid var(--border); border-radius:12px; padding:32px; margin-top:20px; }
.gls-value { font-family:var(--FD); font-size:80px; line-height:1; color:var(--gold2); }
.metric-box { background:var(--bg3); padding:16px; border-radius:8px; border:0.5px solid var(--border); margin-bottom:12px; }
.status-bar { height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; margin-top:8px; }
.status-fill { height:100%; background:var(--gold); transition:1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-gem"></div><span class="sidebar-logo-text">GEM LENS</span></div>
    
    <div class="sidebar-section"><div class="sidebar-section-title">Análisis</div></div>
    <button class="tab-btn active" id="btn-tab-motor" onclick="switchTab('motor')">⚡ MOTOR DE IA</button>
    <button class="tab-btn" id="btn-tab-vision" onclick="switchTab('vision')">👁️ VISIÓN DIRECTA</button>
  </aside>

  <main class="main">
    <div class="panel active" id="panel-motor">
        <div class="upload-container">
            <h2 style="font-family:var(--FD); font-size:32px; color:var(--gold); letter-spacing:1px;">Laboratorio de Visión</h2>
            <p style="color:var(--text3); font-size:13px; margin-bottom:24px;">Subí fotos (frente/dorso) para el análisis Gemini 1.5 Flash</p>
            
            <input type="file" id="imageInput" multiple accept="image/*" style="display:none">
            <button class="btn-upload" onclick="document.getElementById('imageInput').click()">SELECCIONAR FOTOGRAFÍAS</button>
            
            <div class="preview-strip" id="previewStrip"></div>
            
            <button class="btn-run-ia" id="btnRun" disabled onclick="runGeminiAnalysis()">INICIAR ESCANEO</button>
            <div id="loadingMsg" style="display:none; color:var(--gold2); margin-top:20px; font-family:var(--FM); font-size:12px; letter-spacing:1px;">PROCESANDO REDES NEURONALES...</div>
        </div>
        <div id="resultOutput"></div>
    </div>

    <div class="panel" id="panel-vision">
        <div class="card-hero">
            <h2 style="font-family:var(--FD); color:var(--gold); font-size:28px;">Visión Directa</h2>
            <p style="color:var(--text2);">Módulo de inspección técnica manual en desarrollo.</p>
        </div>
    </div>
  </main>
</div>

<script>
// --- 1. CONFIGURACIÓN ---
const GEMINI_API_KEY = "AIzaSyBQHZbd6NhbR6ADGYa0T7s6v715dpiy2hY"; 
let currentImages = [];

// --- 2. NAVEGACIÓN (Corrección de ReferenceError) ---
function switchTab(tabId) {
    // Paneles
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tabId).classList.add('active');
    
    // Botones
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if(tabId === 'motor') document.getElementById('btn-tab-motor').classList.add('active');
    if(tabId === 'vision') document.getElementById('btn-tab-vision').classList.add('active');
}

// --- 3. MANEJO DE IMÁGENES ---
document.getElementById('imageInput').addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentImages.push(ev.target.result);
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.className = 'preview-box';
            document.getElementById('previewStrip').appendChild(img);
            document.getElementById('btnRun').disabled = false;
        };
        reader.readAsDataURL(file);
    });
});

// --- 4. MOTOR IA ---
async function runGeminiAnalysis() {
    const btn = document.getElementById('btnRun');
    const loader = document.getElementById('loadingMsg');
    btn.disabled = true;
    loader.style.display = 'block';

    const prompt = `Analizá estas fotos de una carta TCG. Respondé ÚNICAMENTE con un JSON puro: 
    {"name":"Nombre","set":"Set","gls":9.5,"glp":480,"metrics":{"centering":9,"corners":9.5,"edges":10,"surface":9},"report":"Comentario rioplatense","ars":50000}`;

    try {
        const imageParts = currentImages.map(img => ({
            inline_data: { mime_type: "image/jpeg", data: img.split(',')[1] }
        }));

        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...imageParts] }] })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const rawText = data.candidates[0].content.parts[0].text;
        const jsonStart = rawText.indexOf('{');
        const jsonEnd = rawText.lastIndexOf('}') + 1;
        const res = JSON.parse(rawText.substring(jsonStart, jsonEnd));

        displayResult(res);

    } catch (err) {
        alert("Error: " + err.message);
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}

function displayResult(res) {
    const out = document.getElementById('resultOutput');
    
    // Generamos el HTML de las métricas dinámicamente para evitar errores de comillas
    let metricsHTML = "";
    for (const [key, val] of Object.entries(res.metrics)) {
        metricsHTML += `
            <div class="metric-box">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span style="text-transform:uppercase; color:var(--text3);">${key}</span>
                    <span style="font-family:var(--FM);">${val}</span>
                </div>
                <div class="status-bar"><div class="status-fill" style="width:${val * 10}%"></div></div>
            </div>`;
    }

    out.innerHTML = `
        <div class="card-hero">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:30px;">
                <div>
                    <h1 style="font-family:var(--FD); font-size:48px; letter-spacing:1px;">${res.name}</h1>
                    <div style="color:var(--gold2); font-family:var(--FM); font-size:14px;">${res.set}</div>
                </div>
                <div style="text-align:right">
                    <div class="gls-value">${res.gls}</div>
                    <div style="font-size:10px; color:var(--text3); letter-spacing:2px;">GEM LENS SCORE</div>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:32px;">
                <div>${metricsHTML}</div>
                <div style="background:var(--bg3); padding:24px; border-radius:8px; border:0.5px solid var(--border);">
                    <div style="font-size:10px; color:var(--gold2); margin-bottom:12px; letter-spacing:1px; font-weight:600;">ANÁLISIS TÉCNICO IA</div>
                    <p style="font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:20px;">${res.report}</p>
                    <div style="border-top:1px solid var(--border); padding-top:15px;">
                        <span style="font-size:11px; color:var(--text3);">VALOR ESTIMADO</span>
                        <div style="font-family:var(--FD); font-size:32px; color:var(--gold);">$${(res.ars || 0).toLocaleString('es-AR')} ARS</div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    // Limpieza
    currentImages = [];
    document.getElementById('previewStrip').innerHTML = '';
}
</script>
</body>
</html>
